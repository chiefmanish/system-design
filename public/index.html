<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>System Design Daily</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@9/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f4; color: #111; min-height: 100vh; }

    /* Layout */
    .nav { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .nav-title { font-size: 15px; font-weight: 700; }
    .nav-sub { font-size: 12px; color: #aaa; }
    .back-btn { background: none; border: none; font-size: 14px; color: #888; cursor: pointer; padding: 4px 0; font-family: inherit; display: flex; align-items: center; gap: 4px; }
    .body { padding: 14px 16px; max-width: 480px; margin: 0 auto; }

    /* Cards */
    .card { background: #fff; border-radius: 14px; padding: 15px 16px; margin-bottom: 10px; border: 1px solid #ebebeb; }

    /* Progress */
    .prog-wrap { height: 5px; background: #f0f0f0; border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
    .prog-fill { height: 100%; background: #111; border-radius: 99px; transition: width .5s; }

    /* Badges */
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
    .badge-Beginner     { background: #dcfce7; color: #166534; }
    .badge-Intermediate { background: #fef9c3; color: #854d0e; }
    .badge-Advanced     { background: #ffedd5; color: #9a3412; }
    .badge-Pro          { background: #f3e8ff; color: #6b21a8; }
    .badge-Case         { background: #dbeafe; color: #1e40af; }
    .tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 99px; background: #f3f4f6; color: #888; margin-left: 4px; }

    /* Buttons */
    .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #111; color: #fff; }
    .btn-outline { background: #fff; color: #111; border: 1.5px solid #ddd !important; font-weight: 600; }
    .btn-success { background: #15803d; color: #fff; }
    .btn-danger  { background: #fff; color: #dc2626; border: 1.5px solid #fca5a5 !important; font-weight: 600; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Topic rows */
    .t-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f5f5f5; }
    .t-row:last-child { border-bottom: none; }
    .t-row.locked { opacity: 0.3; }
    .t-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; border: 1px solid #e5e5e5; color: #aaa; background: #f5f5f5; }
    .t-num.done    { background: #dcfce7; border-color: #86efac; color: #166534; }
    .t-num.current { background: #111; border-color: #111; color: #fff; }
    .t-name { flex: 1; min-width: 0; font-size: 13px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-name.done    { color: #ccc; text-decoration: line-through; }
    .t-name.current { color: #111; font-weight: 600; }

    /* Labels */
    .lbl { font-size: 10px; font-weight: 700; color: #bbb; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 7px; }

    /* Lesson content */
    .tldr { background: #f7f7f6; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 14px; line-height: 1.7; color: #333; }
    .sec  { padding-bottom: 13px; margin-bottom: 13px; border-bottom: 1px solid #f3f3f3; }
    .sec:last-of-type { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .sec-num { color: #ddd; font-size: 11px; margin-right: 6px; }
    .sec-heading { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .sec-body { font-size: 14px; line-height: 1.7; color: #555; }
    .eg-box { background: #f7f7f6; border-left: 3px solid #ddd; border-radius: 0 8px 8px 0; padding: 9px 12px; margin-top: 8px; font-size: 13px; color: #777; line-height: 1.6; }
    .co-box { background: #f7f7f6; border-radius: 10px; padding: 12px 13px; }
    .co-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .co-desc { font-size: 13px; color: #666; line-height: 1.65; }
    .insight { background: #eff6ff; border-radius: 10px; padding: 12px 14px; margin-top: 4px; font-size: 14px; line-height: 1.7; color: #1d4ed8; }

    /* Viva */
    .question { font-size: 15px; font-weight: 600; line-height: 1.5; color: #111; }
    textarea { width: 100%; min-height: 130px; resize: vertical; font-size: 15px; padding: 13px; border-radius: 12px; border: 1.5px solid #e5e5e5; font-family: inherit; color: #111; line-height: 1.6; margin-top: 10px; background: #fff; outline: none; }
    textarea:focus { border-color: #111; }

    /* Results */
    .res-pass { background: #f0fdf4; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #86efac; }
    .res-fail { background: #fef2f2; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #fca5a5; }
    .res-title { font-size: 15px; font-weight: 700; }
    .res-title.pass { color: #15803d; }
    .res-title.fail { color: #dc2626; }
    .feedback { font-size: 14px; line-height: 1.7; color: #555; margin-top: 6px; }

    /* Error */
    .err-box { background: #fef2f2; border-radius: 12px; padding: 16px; margin-bottom: 10px; border: 1px solid #fca5a5; }
    .err-title { font-size: 14px; font-weight: 700; color: #dc2626; margin-bottom: 6px; }
    .err-msg { font-size: 11px; color: #999; font-family: monospace; word-break: break-all; margin-bottom: 12px; }

    /* Spinner */
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; padding: 56px 0; gap: 12px; }
    .spinner { width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #111; border-radius: 50%; animation: spin .7s linear infinite; }
    .spinner-msg { font-size: 13px; color: #aaa; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .diagram-wrap { background: #f7f7f6; border-radius: 10px; padding: 14px 10px; margin-bottom: 10px; overflow-x: auto; }
    .diagram-wrap .mermaid { min-width: 260px; }
    .diagram-wrap svg { max-width: 100%; height: auto; }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* Trophy */
    .trophy { text-align: center; padding: 36px 16px; }
    .trophy-icon { font-size: 48px; margin-bottom: 12px; }
    .trophy-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .trophy-sub { font-size: 14px; color: #888; }
  </style>
</head>
<body>

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div class="nav">
    <span class="nav-title">⚙️ System Design Daily</span>
    <span class="nav-sub" id="home-progress-label">0/41 done</span>
  </div>
  <div class="body">
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div class="card" id="today-card">
      <div class="lbl">Today's topic</div>
      <div id="today-title" style="font-size:17px;font-weight:700;line-height:1.35;margin-bottom:8px"></div>
      <div id="today-badges" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px"></div>
      <div id="today-sub" style="font-size:12px;color:#ccc;margin-bottom:2px"></div>
      <button class="btn btn-primary" onclick="startLesson()">▶ Start lesson</button>
    </div>

    <div id="trophy-card" class="card trophy" style="display:none">
      <div class="trophy-icon">🏆</div>
      <div class="trophy-title">Curriculum complete!</div>
      <div class="trophy-sub">You've mastered all 41 topics.</div>
    </div>

    <div class="card">
      <div class="lbl">Curriculum</div>
      <div id="curriculum-list"></div>
      <button class="btn btn-outline" id="show-all-btn" onclick="toggleAll()" style="margin-top:8px">See all 41 topics</button>
    </div>
  </div>
</div>

<!-- LESSON VIEW -->
<div id="view-lesson" class="view">
  <div class="nav">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <span class="nav-sub" id="lesson-nav-sub"></span>
  </div>
  <div class="body">
    <div style="margin-bottom:12px">
      <div id="lesson-title" style="font-size:17px;font-weight:700;line-height:1.35;margin-bottom:8px"></div>
      <div id="lesson-badges"></div>
    </div>
    <div id="lesson-content"></div>
  </div>
</div>

<!-- VIVA VIEW -->
<div id="view-viva" class="view">
  <div class="nav">
    <button class="back-btn" onclick="goLesson()">← Lesson</button>
    <span class="nav-sub">Viva</span>
  </div>
  <div class="body">
    <div class="card" style="margin-bottom:12px">
      <div class="lbl">Question</div>
      <div class="question" id="viva-question"></div>
    </div>
    <div id="viva-content"></div>
  </div>
</div>

<script>
const CUR = [
  ["What is System Design & How to Approach It","Beginner","Foundations"],
  ["Networking Basics — TCP/IP, HTTP & HTTPS","Beginner","Foundations"],
  ["Scalability — Vertical vs Horizontal Scaling","Beginner","Foundations"],
  ["Latency, Throughput & Performance","Beginner","Foundations"],
  ["Availability, Reliability & Fault Tolerance","Beginner","Foundations"],
  ["CAP Theorem & PACELC Theorem","Beginner","Theory"],
  ["DNS — Domain Name System Deep Dive","Beginner","Infrastructure"],
  ["Proxy Servers — Forward vs Reverse Proxy","Beginner","Infrastructure"],
  ["Load Balancing — Algorithms & Tiers","Intermediate","Infrastructure"],
  ["API Gateway — The Front Door of Your System","Intermediate","Infrastructure"],
  ["CDN — Content Delivery Networks","Intermediate","Infrastructure"],
  ["Caching Strategies — Redis, Eviction & Patterns","Intermediate","Performance"],
  ["Back-of-Envelope Estimation & Capacity Planning","Intermediate","Foundations"],
  ["SQL vs NoSQL — When to Use Which","Intermediate","Data"],
  ["Database Indexing","Intermediate","Data"],
  ["Database Replication — Master/Slave & Multi-Master","Intermediate","Data"],
  ["Database Sharding & Data Partitioning","Intermediate","Data"],
  ["Distributed File Systems & Object Storage (S3/HDFS)","Intermediate","Data"],
  ["REST APIs & API Design Best Practices","Intermediate","Communication"],
  ["Rate Limiting & Throttling — Token Bucket & Leaky","Intermediate","Reliability"],
  ["Message Queues & Event Streaming — Kafka & RabbitMQ","Intermediate","Messaging"],
  ["Real-time Comms — WebSockets, SSE & Long Polling","Intermediate","Communication"],
  ["Notification Systems — Push, Email & SMS at Scale","Intermediate","Communication"],
  ["Consistent Hashing","Advanced","Distributed"],
  ["Bloom Filters & Probabilistic Data Structures","Advanced","Distributed"],
  ["Quorum, Leader Election & Consensus (Raft/Paxos)","Advanced","Distributed"],
  ["Distributed Transactions & Saga Pattern","Advanced","Distributed"],
  ["Event Sourcing & CQRS","Advanced","Architecture"],
  ["Microservices vs Monolith Architecture","Advanced","Architecture"],
  ["Service Discovery & Service Mesh (Istio/Envoy)","Advanced","Architecture"],
  ["Circuit Breaker & Resilience Patterns","Advanced","Reliability"],
  ["Security Design — Auth, OAuth 2.0, JWT & Zero Trust","Advanced","Security"],
  ["Search Systems — Elasticsearch & Inverted Index","Advanced","Data"],
  ["Case Study: Design a URL Shortener (like Bitly)","Advanced","Case Study"],
  ["Case Study: Design a Chat App (like WhatsApp)","Advanced","Case Study"],
  ["Case Study: Design a Video Platform (like YouTube)","Advanced","Case Study"],
  ["Case Study: Design a Ride-Hailing App (like Uber)","Advanced","Case Study"],
  ["Case Study: Design a News Feed (like Twitter/X)","Advanced","Case Study"],
  ["Vector Databases & AI System Design","Pro","AI Systems"],
  ["LLM APIs, Agent Orchestration & RAG Systems","Pro","AI Systems"],
  ["Designing AI-Powered Apps at Scale (Buddy v2 🚀)","Pro","AI Systems"],
];

// State
let state = {
  idx: 0,
  done: [],
  showAll: false,
  lesson: null,
  question: "",
};

// Persist
function saveState() {
  localStorage.setItem("syd-state", JSON.stringify({ idx: state.idx, done: state.done }));
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("syd-state") || "{}");
    state.idx  = s.idx  || 0;
    state.done = s.done || [];
  } catch(e) {}
}

// Badge HTML
function badge(lvl) {
  const cls = lvl === "Case Study" ? "badge-Case" : `badge-${lvl}`;
  return `<span class="badge ${cls}">${lvl}</span>`;
}

// Render home
function renderHome() {
  const t = CUR[Math.min(state.idx, CUR.length - 1)];
  const pct = Math.round((state.done.length / CUR.length) * 100);
  const finished = state.idx >= CUR.length;

  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("home-progress-label").textContent = `${state.done.length}/${CUR.length} · ${pct}%`;

  document.getElementById("today-card").style.display   = finished ? "none" : "block";
  document.getElementById("trophy-card").style.display  = finished ? "block" : "none";

  if (!finished) {
    document.getElementById("today-title").textContent = t[0];
    document.getElementById("today-badges").innerHTML  = badge(t[1]) + `<span class="tag">${t[2]}</span>`;
    document.getElementById("today-sub").textContent   = `Topic ${state.idx + 1} of ${CUR.length}`;
  }

  renderCurriculum();
}

function renderCurriculum() {
  const limit = state.showAll ? CUR.length : 10;
  let html = "";
  for (let i = 0; i < limit; i++) {
    const c = CUR[i];
    const isComp = state.done.includes(i);
    const isCur  = i === state.idx;
    const isLock = i > state.idx && !isComp;
    const numCls = isComp ? "done" : isCur ? "current" : "";
    const nameCls = isComp ? "done" : isCur ? "current" : "";
    html += `<div class="t-row${isLock ? " locked" : ""}">
      <div class="t-num ${numCls}">${isComp ? "✓" : i + 1}</div>
      <div class="t-name ${nameCls}">${c[0]}</div>
      ${badge(c[1])}
    </div>`;
  }
  document.getElementById("curriculum-list").innerHTML = html;
  const btn = document.getElementById("show-all-btn");
  btn.textContent = state.showAll ? "Show less" : `See all ${CUR.length} topics`;
}

function toggleAll() {
  state.showAll = !state.showAll;
  renderCurriculum();
}

// API call
async function callAI(prompt) {
  const resp = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const raw = await resp.text();
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${raw.slice(0, 200)}`);
  const data = JSON.parse(raw);
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const text = data.choices?.[0]?.message?.content || "";
  if (!text) throw new Error("Empty response from AI");
  // Extract JSON robustly
  try { return JSON.parse(text); } catch(_) {}
  const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenced) { try { return JSON.parse(fenced[1].trim()); } catch(_) {} }
  const s = text.indexOf("{"), e = text.lastIndexOf("}");
  if (s !== -1 && e > s) { try { return JSON.parse(text.slice(s, e + 1)); } catch(_) {} }
  throw new Error(`Could not parse JSON. AI said: ${text.slice(0, 300)}`);
}

// Views
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + id).classList.add("active");
  window.scrollTo(0, 0);
}
function goHome()   { showView("home"); renderHome(); }
function goLesson() { showView("lesson"); }

// Start lesson
async function startLesson() {
  showView("lesson");
  const t = CUR[state.idx];
  document.getElementById("lesson-nav-sub").textContent = `Lesson ${state.idx + 1}/${CUR.length}`;
  document.getElementById("lesson-title").textContent   = t[0];
  document.getElementById("lesson-badges").innerHTML    = badge(t[1]) + `<span class="tag">${t[2]}</span>`;
  document.getElementById("lesson-content").innerHTML   = spinnerHTML("Preparing your lesson…");

  try {
    const data = await callAI(
      `Teach me: "${t[0]}" (level: ${t[1]})

Return ONLY this JSON (no markdown, no backticks, no preamble, no trailing text):
{
  "tldr": "one punchy sentence — lead with the core trade-off or the problem this solves",
  "sections": [
    {
      "heading": "short title",
      "content": "2-3 sentences. Start with a real-world analogy, then the technical reality. Include a concrete number or scale reference.",
      "example": "specific company + what they actually use this for"
    }
  ],
  "company_example": {
    "company": "company name",
    "what": "what specific system they built",
    "how": "2 sentences: the problem they had, and exactly how this concept solved it"
  },
  "key_insight": "the one thing a senior engineer knows that a junior misses — include a 'use when / avoid when' trade-off",
  "viva_question": "an open-ended interview-style question that requires applied thinking, not recitation — e.g. 'You're designing X and notice Y. How do you approach Z?'"
}

Rules: exactly 3 sections. No extra keys. Valid JSON only.`
    );
    state.lesson = data;
    state.question = data.viva_question || "Explain this concept and give a real-world example.";
    document.getElementById("lesson-content").innerHTML = renderLessonHTML(data);
    // Fetch diagram separately so it never breaks lesson parsing
    fetchDiagram(t[0]);
  } catch(e) {
    document.getElementById("lesson-content").innerHTML = errorHTML(e.message, "startLesson()");
  }
}

function renderLessonHTML(d) {
  let html = `<div class="card">
    <div class="lbl">TL;DR</div>
    <div class="tldr">${esc(d.tldr)}</div>`;

  (d.sections || []).forEach((s, i) => {
    const last = i === (d.sections.length - 1);
    html += `<div class="sec${last ? ' last' : ''}">
      <div class="sec-heading"><span class="sec-num">${String(i+1).padStart(2,"0")}</span>${esc(s.heading)}</div>
      <div class="sec-body">${esc(s.content)}</div>
      ${s.example ? `<div class="eg-box">💡 ${esc(s.example)}</div>` : ""}
    </div>`;
  });
  html += `</div>`;

  if (d.company_example) {
    html += `<div class="card">
      <div class="lbl">Real world</div>
      <div class="co-box">
        <div class="co-name">🏢 ${esc(d.company_example.company)} — ${esc(d.company_example.what)}</div>
        <div class="co-desc">${esc(d.company_example.how)}</div>
      </div>
    </div>`;
  }

  if (d.diagram) {
    html += `<div class="card">
      <div class="lbl">Architecture Diagram</div>
      <div class="diagram-wrap" id="diagram-container"><div class="spinner-msg" style="text-align:center;padding:20px;color:#aaa">Rendering diagram…</div></div>
    </div>`;
  }

  if (d.key_insight) {
    html += `<div class="insight">🔑 ${esc(d.key_insight)}</div>`;
  }

  html += `<button class="btn btn-primary" onclick="startViva()" style="margin-top:14px">✏️ Take the viva</button>`;
  return html;
}

// Viva
function startViva() {
  showView("viva");
  document.getElementById("viva-question").textContent = state.question;
  renderVivaInput();
}

function renderVivaInput() {
  document.getElementById("viva-content").innerHTML = `
    <textarea id="ans-input" placeholder="Explain it in your own words — plain English is fine. Focus on the concept, not perfection." oninput="updateSubmit()"></textarea>
    <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>Submit answer →</button>`;
}

function updateSubmit() {
  const val = document.getElementById("ans-input")?.value || "";
  const btn = document.getElementById("submit-btn");
  if (btn) btn.disabled = val.trim().length < 10;
}

async function submitAnswer() {
  const ans = document.getElementById("ans-input").value;
  const t = CUR[state.idx];
  document.getElementById("viva-content").innerHTML = spinnerHTML("Evaluating your answer…");

  try {
    const data = await callAI(
      `You are evaluating a system design student. Be a fair but direct FAANG-style interviewer.

Topic taught: "${t[0]}"
Lesson TL;DR: "${state.lesson?.tldr || ''}"
Key insight from lesson: "${state.lesson?.key_insight || ''}"
Question asked: "${state.question}"
Student answer: "${ans}"

Evaluate ONLY based on concepts covered in this specific lesson. Do NOT penalise for unrelated topics.

Return ONLY this JSON (no markdown, no backticks):
{
  "passed": true or false,
  "score": "Excellent" or "Great" or "Good" or "Partially Correct" or "Needs Work",
  "feedback": "2-3 sentences: be specific. Name what they got right and exactly where their understanding broke down. If they passed, add one senior-engineer insight they can build on.",
  "correct_answer": "2 sentences: the mental model they were missing, framed as 'The key insight is...' — ONLY include if passed is false"
}

Pass threshold: student demonstrates they understand the WHY behind the concept, not just the definition. Imperfect wording is fine — look for the core mental model.`
    );

    if (data.passed) {
      if (!state.done.includes(state.idx)) state.done = [...state.done, state.idx];
      saveState();
    }

    const isLast = state.idx >= CUR.length - 1;
    let html = `<div class="${data.passed ? "res-pass" : "res-fail"}">
      <div class="res-title ${data.passed ? "pass" : "fail"}">${data.passed ? "✅ " + data.score + " — Passed!" : "❌ " + data.score + " — Try again"}</div>
      <div class="feedback">${esc(data.feedback)}</div>
    </div>`;

    if (!data.passed && data.correct_answer) {
      html += `<div class="card"><div class="lbl">Ideal answer</div><div class="feedback">${esc(data.correct_answer)}</div></div>`;
    }

    if (data.passed) {
      html += `<button class="btn btn-success" onclick="nextTopic()">${isLast ? "🏆 Complete the curriculum!" : "Next topic →"}</button>`;
    } else {
      html += `<button class="btn btn-danger" onclick="retryViva()">↩ Try again</button>`;
    }

    document.getElementById("viva-content").innerHTML = html;
  } catch(e) {
    document.getElementById("viva-content").innerHTML = errorHTML(e.message, "submitAnswer()");
  }
}

function retryViva() {
  renderVivaInput();
}

function nextTopic() {
  const ni = Math.min(state.idx + 1, CUR.length);
  state.idx = ni;
  saveState();
  state.lesson = null; state.question = "";
  goHome();
}

// Helpers
function spinnerHTML(msg) {
  return `<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-msg">${msg}</div></div>`;
}
function errorHTML(msg, retryFn) {
  return `<div class="err-box">
    <div class="err-title">Something went wrong</div>
    <div class="err-msg">${esc(msg)}</div>
    <button class="btn btn-outline" onclick="${retryFn}">Try again</button>
  </div>`;
}
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Fetch diagram as a SEPARATE call so it never breaks lesson JSON
async function fetchDiagram(topicName) {
  const container = document.getElementById("diagram-container");
  if (!container) return;
  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{
          role: "user",
          content: `Draw a Mermaid.js architecture diagram for: "${topicName}"

Rules:
- Use ONLY "graph TD" syntax
- Node IDs must be single letters or short words: A, B, C, DB, LB, CDN
- Node labels in square brackets only: A[Client], B[Load Balancer]
- Show the happy-path data flow only — 4 to 6 nodes max
- Label edges with the protocol or action where it adds clarity: A -->|HTTPS| B
- No quotes, no parentheses, no special characters in node labels

Return ONLY the raw Mermaid code. No explanation, no backticks, no markdown.`
        }]
      })
    });
    const data = await resp.json();
    let raw = data.choices?.[0]?.message?.content || "";
    // Strip any backtick fences if model added them
    raw = raw.replace(/\`\`\`(?:mermaid)?/gi, "").replace(/\`\`\`/g, "").trim();
    if (!raw.startsWith("graph")) {
      container.innerHTML = `<div style="text-align:center;padding:16px;color:#aaa;font-size:13px">Diagram unavailable</div>`;
      return;
    }
    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });
    const { svg } = await mermaid.render("mermaid-diagram", raw);
    container.innerHTML = svg;
  } catch(e) {
    if (container) container.innerHTML = `<div style="text-align:center;padding:16px;color:#aaa;font-size:13px">Diagram unavailable</div>`;
  }
}
